<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>J.A. Woollam 견적 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif;background:#eef2f7;color:#1e293b;min-height:100vh}
header{background:linear-gradient(135deg,#0f2044,#1e4d8c);color:white;padding:13px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.25)}
header h1{font-size:1.05rem;font-weight:700}
header p{font-size:.7rem;opacity:.7;margin-top:1px}
.layout{display:flex;height:calc(100vh - 52px)}

/* ── 사이드바 ── */
.sidebar{width:240px;min-width:210px;background:white;border-right:1px solid #d1dae8;display:flex;flex-direction:column;overflow:hidden}
.step-lbl{background:#f0f4fa;padding:7px 12px;font-size:.66rem;font-weight:800;color:#4a6080;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:6px;flex-shrink:0}
.step-num{background:#1e4d8c;color:white;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;flex-shrink:0}
.dev-scroll{overflow-y:auto;flex:1;padding:5px}
.acc-grp{margin-bottom:2px}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:.76rem;font-weight:700;color:#334155;background:#f8fafc;border:1px solid #e8edf5;transition:all .14s;user-select:none}
.acc-hdr:hover{background:#eff6ff;border-color:#bfdbfe}
.acc-hdr.open{background:#dbeafe;border-color:#3b82f6;color:#1e4d8c}
.acc-arr{font-size:.65rem;transition:transform .18s}
.acc-hdr.open .acc-arr{transform:rotate(90deg)}
.acc-body{display:none;padding:2px 0 2px 6px}
.acc-body.show{display:block}
.dev-card{padding:7px 9px;border-radius:5px;cursor:pointer;margin-bottom:2px;border:1.5px solid transparent;transition:all .12s;background:#fafbfc}
.dev-card:hover{background:#eff6ff;border-color:#bfdbfe}
.dev-card.active{background:#dbeafe;border-color:#3b82f6}
.dev-card .dn{font-size:.78rem;font-weight:700;color:#1e293b}
.dev-card .dm{font-size:.64rem;color:#64748b;margin-top:1px}
.dev-card .dp{font-size:.7rem;color:#1d4ed8;font-weight:600;margin-top:2px}
.dev-card .dd{font-size:.64rem;color:#6b7280;margin-top:1px}

/* ── 메인 ── */
.main{flex:1;display:flex;overflow:hidden}
.left-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.opt-scroll{flex:1;overflow-y:auto;padding:12px 14px;background:#eef2f7}
.empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55%;color:#94a3b8;text-align:center}
.empty-msg .ei{font-size:2.5rem;margin-bottom:8px}
.empty-msg h3{font-size:.88rem;color:#64748b}
.dev-bar{background:white;border-radius:8px;padding:11px 13px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.dev-bar h2{font-size:.9rem;color:#0f2044;font-weight:800}
.dev-bar .sub{font-size:.67rem;color:#64748b;margin-top:1px}
.dev-bar .deliv{font-size:.67rem;color:#7c3aed;font-weight:600;margin-top:2px}
.dev-bar .bp{font-size:.88rem;font-weight:800;color:#1e4d8c;white-space:nowrap}
.dev-bar .bu{font-size:.63rem;color:#94a3b8}
.opt-grp{background:white;border-radius:8px;padding:11px 13px;margin-bottom:9px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.grp-ttl{font-size:.73rem;font-weight:800;color:#334155;margin-bottom:7px;display:flex;align-items:center;gap:5px;padding-bottom:6px;border-bottom:1px solid #f1f5f9}
.badge{font-size:.58rem;padding:1px 5px;border-radius:7px;font-weight:700}
.b-note{background:#fef9c3;color:#713f12}
.b-excl{background:#fee2e2;color:#991b1b}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:5px}
.chip{border:1.5px solid #e2e8f0;border-radius:6px;padding:8px 9px;cursor:pointer;transition:all .12s;background:#fafbfc}
.chip:hover{border-color:#93c5fd;background:#eff6ff}
.chip.sel{border-color:#3b82f6;background:#eff6ff}
.chip.sel .cn{color:#1d4ed8}
.chk{float:right;color:#3b82f6;font-size:.78rem;display:none}
.chip.sel .chk{display:inline}
.cn{font-size:.75rem;font-weight:600;color:#334155;margin-bottom:2px;padding-right:13px}
.cu{font-size:.62rem;color:#94a3b8}
.ck{font-size:.68rem;color:#64748b;font-weight:600}
.neg{color:#16a34a!important}

/* ── 선택요약 패널 ── */
.summary-panel{width:220px;min-width:200px;background:white;border-left:1px solid #d1dae8;display:flex;flex-direction:column;overflow:hidden}
.sum-scroll{flex:1;overflow-y:auto;padding:8px}
.sum-empty{text-align:center;color:#94a3b8;font-size:.72rem;padding:20px 8px}
.sum-section{margin-bottom:8px}
.sum-hdr{font-size:.62rem;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;padding:4px 2px;border-bottom:1px solid #f1f5f9;margin-bottom:4px}
.sum-item{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;padding:4px 3px;border-radius:4px;background:#fafbfc;margin-bottom:2px}
.sum-item:hover{background:#eff6ff}
.sum-name{font-size:.68rem;color:#334155;font-weight:600;flex:1;line-height:1.3}
.sum-price{font-size:.65rem;color:#1e4d8c;font-weight:700;white-space:nowrap}
.sum-del{cursor:pointer;font-size:.65rem;color:#94a3b8;padding:0 2px;flex-shrink:0}
.sum-del:hover{color:#ef4444}
.sum-dev{background:#dbeafe;border-radius:5px;padding:5px 7px;margin-bottom:6px}
.sum-dev-name{font-size:.75rem;font-weight:800;color:#1e4d8c}
.sum-dev-price{font-size:.68rem;color:#334155;margin-top:1px}
.sum-dev-deliv{font-size:.63rem;color:#7c3aed;margin-top:1px}
.sum-total{background:#f0f4fa;border-radius:5px;padding:6px 8px;margin-top:6px;font-size:.7rem;color:#334155}
.sum-total .st-row{display:flex;justify-content:space-between;margin-bottom:2px}
.sum-total .st-row:last-child{margin-bottom:0;font-weight:800;color:#0f2044}

/* ── 견적바 ── */
.qbar{background:white;border-top:1px solid #d1dae8;padding:9px 14px;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.q-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.mf{display:flex;flex-direction:column;gap:2px;flex:1;min-width:100px}
.mf label{font-size:.63rem;color:#64748b;font-weight:700}
.mf input{border:1px solid #e2e8f0;border-radius:4px;padding:4px 7px;font-size:.76rem;color:#1e293b;font-family:inherit;outline:none;transition:border-color .13s}
.mf input:focus{border-color:#3b82f6}
.q-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.totals{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.titem{display:flex;flex-direction:column;gap:1px}
.titem label{font-size:.6rem;color:#94a3b8;font-weight:600}
.titem .val{font-size:.82rem;font-weight:800;color:#0f2044}
.titem .val.accent{color:#1e4d8c}
.titem .val.green{color:#15803d}
.titem .val.red{color:#dc2626}
.titem .val.sm{font-size:.72rem}
.divider{width:1px;height:30px;background:#e2e8f0;flex-shrink:0}
.btn-row{display:flex;gap:6px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.77rem;font-weight:700;transition:all .12s;font-family:inherit}
.btn-r{background:#f1f5f9;color:#475569}.btn-r:hover{background:#e2e8f0}
.btn-e{background:linear-gradient(135deg,#1e4d8c,#2563eb);color:white;box-shadow:0 2px 8px rgba(30,77,140,.3)}
.btn-e:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(30,77,140,.4)}
.btn-e:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.toast{position:fixed;bottom:14px;right:14px;background:#1e293b;color:white;padding:8px 14px;border-radius:7px;font-size:.76rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.3);transform:translateY(60px);opacity:0;transition:all .22s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
</style>
</head>
<body>
<header>
  <div style="font-size:1.5rem">🔬</div>
  <div>
    <h1>J.A. Woollam 엘립소미터 견적 시스템</h1>
    <p>장비/옵션 선택 → 견적창 엑셀 자동 생성 (DB 기준)</p>
  </div>
</header>
<div class="layout">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="step-lbl"><div class="step-num">1</div>장비 선택</div>
    <div class="dev-scroll" id="devList"></div>
  </div>
  <!-- 메인 -->
  <div class="main">
    <div class="left-main">
      <div class="opt-scroll" id="optPanel">
        <div class="empty-msg"><div class="ei">🔬</div><h3>왼쪽에서 장비를 선택하세요</h3></div>
      </div>
      <div class="qbar">
        <div class="step-lbl" style="margin:-9px -14px 7px;border-radius:0"><div class="step-num">3</div>견적 정보</div>
        <div class="q-meta">
          <div class="mf"><label>회사명</label><input id="company" placeholder="(주)고객사명"></div>
          <div class="mf"><label>담당자</label><input id="manager" placeholder="홍길동"></div>
          <div class="mf"><label>납기일</label><input type="date" id="dueDate"></div>
          <div class="mf"><label>기준환율</label><input id="fxRate" type="number" value="1550" min="1000" max="2500"></div>
          <div class="mf"><label>할인율 (%)</label><input id="discRate" type="number" value="0" min="0" max="50" step="0.1"></div>
        </div>
        <div class="q-bottom">
          <div class="totals">
            <div class="titem"><label>견적가 (G열)</label><div class="val accent" id="tQuote">₩0</div></div>
            <div class="divider"></div>
            <div class="titem"><label>할인율</label><div class="val sm" id="tDisc">0%</div></div>
            <div class="titem"><label>할인후 견적가</label><div class="val accent" id="tDiscQuote">₩0</div></div>
            <div class="divider"></div>
            <div class="titem"><label>예상구매비 (L51)</label><div class="val sm" id="tINT">₩0</div></div>
            <div class="titem"><label>예상마진 (L52)</label><div class="val green" id="tMargin">₩0</div></div>
            <div class="titem"><label>마진율</label><div class="val sm" id="tMarginPct">0%</div></div>
          </div>
          <div class="btn-row">
            <button class="btn btn-r" onclick="resetAll()">초기화</button>
            <button class="btn btn-e" id="exportBtn" onclick="exportExcel()" disabled>📥 견적창 엑셀</button>
          </div>
        </div>
      </div>
    </div>
    <!-- 선택 요약 패널 -->
    <div class="summary-panel">
      <div class="step-lbl"><div class="step-num">✓</div>선택 요약</div>
      <div class="sum-scroll" id="sumPanel">
        <div class="sum-empty">장비/옵션을 선택하면<br>여기에 표시됩니다</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

const ALL_DEVS = GROUPS.flatMap(g=>g.devs);
function getDevById(id){return ALL_DEVS.find(d=>d.id===id);}
function getSeriesTags(dev){
  const id=dev.id,s=dev.slot,t=[];
  if(id.startsWith("m2k"))t.push("M-2000");
  if(id.startsWith("rc2"))t.push("RC2");
  if(["alpha","ise","theta"].includes(id))t.push("SMALL_SE");
  if(["rc2ss","tsolar","m2krp"].includes(id))t.push("기타");
  if(["vase","irvase","vuv1","vuv2"].includes(id))t.push("VASE");
  if(id==="vase")t.push("VASE(V)");
  if(id==="irvase")t.push("VASE(IR)");
  if(id==="vuv1"||id==="vuv2")t.push("VASE(VUV)");
  if(s==="HEAD_INSITU")t.push("INSITU");
  if(s==="HEAD_HORZ"){if(t.includes("M-2000"))t.push("M-2000(H)");if(t.includes("RC2"))t.push("RC2(H)");}
  if(s==="HEAD_VERT"){if(t.includes("M-2000"))t.push("M-2000(V)");if(t.includes("RC2"))t.push("RC2(V)");}
  return t;
}
function getOptGroups(dev){const tags=getSeriesTags(dev);return OPTION_GROUPS.filter(g=>g.forSeries.some(s=>tags.includes(s)));}

// G열 수식
const GK=0.112,GK20=0.015,GN20=0.4,GO20=300,GK21=0.01226,GL22=100000;
function rup(n,d){const f=Math.pow(10,-d);return Math.ceil(n/f)*f;}
function calcG(fv){
  const fx=getFX(),e=fv*fx;
  return rup(rup(e,-5)+e*GK+rup(e*GN20*GK20/365*GO20,-5)+rup(e*GK21/365*GO20,-5)+GL22,-6);
}
function getFX(){return parseInt(document.getElementById("fxRate").value)||1550;}
function getDisc(){return (parseFloat(document.getElementById("discRate").value)||0)/100;}
function fmtW(n){const neg=n<0;return(neg?"−":"")+"₩"+Math.abs(Math.round(n)).toLocaleString("ko-KR");}
function fmtWS(n){const neg=n<0;return(neg?"−":"+")+"₩"+Math.abs(Math.round(n)).toLocaleString("ko-KR");}

// L52 = L42 - L51
// L42 = L23*(1-disc)  (결정가격)
// L45 = INT_USD * 0.85 * fx  (Wiz 구매가, M45=M44*0.85)
// L46 = rup(L23*0.02,-5)  (운임 = L16 = L11*K16 ≈ totalG*0.02)
// L47 = L45*0.002  (통관수수료)
// L48 = L45*0.01226  (계약이행보증)
// L49 = rup(L45*0.4*0.015/365*300,-5)  (선급금보증)
// L50 = 100000  (하자이행보증)
// L51 = SUM(L45:L50)
function calcL52(totalG, totalINT){
  const fx=getFX(), disc=getDisc();
  const L23=totalG;
  const L42=Math.round(L23*(1-disc));
  const M44=totalINT;
  const L45=M44*0.85*fx;
  const L46=rup(L23*0.02,-5);
  const L47=L45*0.002;
  const L48=L45*0.01226;
  const L49=rup(L45*0.4*0.015/365*300,-5);
  const L50=GL22;
  const L51=L45+L46+L47+L48+L49+L50;
  return {L42, L45, L51, L52:L42-L51};
}

// STATE
let curDev=null, selMap={};

// SIDEBAR
function renderDevList(){
  const el=document.getElementById("devList");
  let h="";
  GROUPS.forEach(g=>{
    const isOpen=curDev&&g.devs.some(d=>d.id===curDev.id);
    h+=`<div class="acc-grp">
      <div class="acc-hdr${isOpen?" open":""}" onclick="toggleGrp('${g.id}',this)">
        <span>${g.label}</span><span class="acc-arr">▶</span>
      </div>
      <div class="acc-body${isOpen?" show":""}" id="acc-${g.id}">`;
    g.devs.forEach(d=>{
      h+=`<div class="dev-card${curDev?.id===d.id?" active":""}" onclick="selectDev('${d.id}')">
        <div class="dn">${d.name}</div>
        <div class="dm">${d.sub}</div>
        <div class="dp">${fmtW(calcG(d.f))} ~</div>
        <div class="dd">📦 납기 ${d.deliv}일</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function toggleGrp(gid,hdr){
  const body=document.getElementById("acc-"+gid);
  const open=body.classList.toggle("show");
  hdr.classList.toggle("open",open);
}

// SELECT DEVICE
function selectDev(id){
  curDev=getDevById(id);
  selMap={};
  getOptGroups(curDev).forEach(g=>{selMap[g.id]=new Set();});
  renderDevList();renderOptions();renderSummary();updateBottom();
}

// RENDER OPTIONS
function renderOptions(){
  const panel=document.getElementById("optPanel");
  if(!curDev){panel.innerHTML='<div class="empty-msg"><div class="ei">🔬</div><h3>왼쪽에서 장비를 선택하세요</h3></div>';return;}
  let h=`<div class="dev-bar">
    <div>
      <h2>🔬 ${curDev.name}</h2>
      <div class="sub">${curDev.sub}</div>
      <div class="deliv">📦 납기 ${curDev.deliv}일 (약 ${Math.round(curDev.deliv/30)}개월)</div>
    </div>
    <div style="text-align:right">
      <div class="bp">${fmtW(calcG(curDev.f))}</div>
      <div class="bu">내자견적가 (G열) · INT USD ${curDev.int.toLocaleString()}</div>
    </div>
  </div>
  <div class="step-lbl" style="border-radius:8px;margin-bottom:9px"><div class="step-num">2</div>옵션 선택</div>`;

  getOptGroups(curDev).forEach(g=>{
    if(!selMap[g.id])selMap[g.id]=new Set();
    const nb=g.note?`<span class="badge b-note">${g.note}</span>`:"";
    const mb=`<span class="badge b-excl">${g.multi?"복수":"단일"}</span>`;
    h+=`<div class="opt-grp"><div class="grp-ttl">📦 ${g.label} ${nb} ${mb}</div><div class="opt-grid">`;
    g.options.forEach(opt=>{
      const sel=selMap[g.id]?.has(opt.id), neg=opt.f<0;
      const kv=calcG(Math.abs(opt.f))*(neg?-1:1);
      h+=`<div class="chip${sel?" sel":""}" onclick="toggleOpt('${g.id}','${opt.id}',${!!g.multi},${g.maxSel||999})">
        <span class="chk">✓</span>
        <div class="cn">${opt.name}</div>
        <div class="${neg?"ck neg":"ck"}">${fmtWS(kv)}</div>
        <div class="cu">F: USD ${Math.abs(opt.f).toLocaleString()}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  panel.innerHTML=h;
}

// TOGGLE OPTION
function toggleOpt(gid,oid,multi,maxSel){
  const s=selMap[gid];
  if(multi){
    if(s.has(oid))s.delete(oid);
    else if(s.size<maxSel)s.add(oid);
    else showToast(`최대 ${maxSel}개까지 선택 가능합니다`);
  }else{s.has(oid)?s.clear():(s.clear(),s.add(oid));}
  renderOptions();renderSummary();updateBottom();
}

// RENDER SUMMARY PANEL
function renderSummary(){
  const panel=document.getElementById("sumPanel");
  if(!curDev){panel.innerHTML='<div class="sum-empty">장비/옵션을 선택하면<br>여기에 표시됩니다</div>';return;}
  const disc=getDisc();
  let totalG=calcG(curDev.f), totalINT=curDev.int;
  let optItems=[];

  getOptGroups(curDev).forEach(g=>{
    g.options.forEach(o=>{
      if(selMap[g.id]?.has(o.id)){
        const neg=o.f<0, kv=calcG(Math.abs(o.f))*(neg?-1:1);
        totalG+=kv; totalINT+=o.int;
        optItems.push({name:o.name, price:kv, gid:g.id, oid:o.id});
      }
    });
  });

  const {L42,L45,L51,L52}=calcL52(totalG,totalINT);
  const marginPct=L42>0?L52/L42*100:0;

  let h=`<div class="sum-dev">
    <div class="sum-dev-name">🔬 ${curDev.name}</div>
    <div class="sum-dev-price">${fmtW(calcG(curDev.f))}</div>
    <div class="sum-dev-deliv">📦 납기 ${curDev.deliv}일</div>
  </div>`;

  if(optItems.length>0){
    h+=`<div class="sum-section"><div class="sum-hdr">선택된 옵션 (${optItems.length}개)</div>`;
    optItems.forEach(it=>{
      h+=`<div class="sum-item">
        <div class="sum-name">${it.name}</div>
        <div style="display:flex;align-items:center;gap:3px">
          <div class="sum-price">${fmtWS(it.price)}</div>
          <div class="sum-del" onclick="removeOpt('${it.gid}','${it.oid}')">✕</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div style="font-size:.68rem;color:#94a3b8;padding:6px 2px">선택된 옵션 없음</div>`;
  }

  h+=`<div class="sum-total">
    <div class="st-row"><span>견적가 (G열)</span><span>${fmtW(totalG)}</span></div>
    <div class="st-row"><span>할인율</span><span>${(disc*100).toFixed(1)}%</span></div>
    <div class="st-row"><span>할인후 (L42)</span><span>${fmtW(L42)}</span></div>
    <div class="st-row"><span>Wiz 구매가 (L45)</span><span>${fmtW(L45)}</span></div>
    <div class="st-row"><span>기타비용 (L46~L50)</span><span>${fmtW(L51-L45)}</span></div>
    <div class="st-row"><span>예상구매비 (L51)</span><span>${fmtW(L51)}</span></div>
    <div class="st-row" style="padding-top:4px;border-top:1px solid #e2e8f0;margin-top:3px"><span>예상마진 (L52)</span><span style="color:${L52>=0?"#15803d":"#dc2626"}">${fmtW(L52)} (${marginPct.toFixed(1)}%)</span></div>
  </div>`;

  panel.innerHTML=h;
}

function removeOpt(gid,oid){
  selMap[gid]?.delete(oid);
  renderOptions();renderSummary();updateBottom();
}

// UPDATE BOTTOM
function updateBottom(){
  if(!curDev){
    ["tQuote","tDiscQuote","tINT","tMargin","tMarginPct","tDisc"].forEach(id=>{
      document.getElementById(id).textContent=id==="tDisc"?"0%":"₩0";
    });
    document.getElementById("exportBtn").disabled=true;
    return;
  }
  let totalG=calcG(curDev.f), totalINT=curDev.int;
  getOptGroups(curDev).forEach(g=>{
    g.options.forEach(o=>{
      if(selMap[g.id]?.has(o.id)){
        const neg=o.f<0;
        totalG+=calcG(Math.abs(o.f))*(neg?-1:1);
        totalINT+=o.int;
      }
    });
  });
  const disc=getDisc();
  const {L42,L45,L51,L52}=calcL52(totalG,totalINT);
  const pct=L42>0?L52/L42*100:0;
  document.getElementById("tQuote").textContent=fmtW(totalG);
  document.getElementById("tDisc").textContent=(disc*100).toFixed(1)+"%";
  document.getElementById("tDiscQuote").textContent=fmtW(L42);
  document.getElementById("tINT").textContent=fmtW(L51);
  const mel=document.getElementById("tMargin");
  mel.textContent=fmtW(L52);
  mel.className="val"+(L52>=0?" green":" red");
  document.getElementById("tMarginPct").textContent=pct.toFixed(1)+"%";
  document.getElementById("exportBtn").disabled=false;
}

// EXPORT
function exportExcel(){
  if(!curDev)return;
  const bin=atob(TEMPLATE_B64);
  const ab=new ArrayBuffer(bin.length);
  const ua=new Uint8Array(ab);
  for(let i=0;i<bin.length;i++)ua[i]=bin.charCodeAt(i);
  const wb=XLSX.read(ab,{type:"array",cellFormula:true,cellStyles:true});
  const ws=wb.Sheets["견적창"];
  ws["D1"]={t:"n",v:getFX()};
  for(let r=4;r<=38;r++)ws[`D${r}`]={t:"s",v:""};
  ws[`D${ROW_MAP[curDev.slot]}`]={t:"s",v:curDev.dbName.trim()};
  getOptGroups(curDev).forEach(g=>{
    const selIds=Array.from(selMap[g.id]||[]);
    if(!selIds.length)return;
    if(g.id==="camera_tab"){
      selIds.forEach(oid=>{const opt=g.options.find(o=>o.id===oid);if(opt?.slot)ws[`D${ROW_MAP[opt.slot]}`]={t:"s",v:opt.dbName};});
    }else if(g.slots){
      selIds.slice(0,g.slots.length).forEach((oid,i)=>{const opt=g.options.find(o=>o.id===oid);if(opt)ws[`D${ROW_MAP[g.slots[i]]}`]={t:"s",v:opt.dbName};});
    }else if(g.slot){
      const opt=g.options.find(o=>o.id===selIds[0]);
      if(opt)ws[`D${ROW_MAP[g.slot]}`]={t:"s",v:opt.dbName};
    }
  });
  const company=document.getElementById("company").value||"";
  const today=new Date().toLocaleDateString("ko-KR");
  const out=XLSX.write(wb,{type:"array",bookType:"xlsx",cellStyles:true});
  const blob=new Blob([out],{type:"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`견적창_${curDev.name.replace(/[®™]/g,"")}_${company}_${today.replace(/\./g,"")}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("✅ 견적창 엑셀 다운로드 완료!");
}

function resetAll(){
  curDev=null;selMap={};
  renderDevList();renderOptions();renderSummary();updateBottom();
  ["company","manager","dueDate"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fxRate").value=1550;
  document.getElementById("discRate").value=0;
}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}
["fxRate","discRate"].forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>{renderDevList();renderOptions();renderSummary();updateBottom();});
});
renderDevList();updateBottom();
</script>
